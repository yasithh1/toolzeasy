<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found - ToolzEasy</title>
      <link rel="shortcut icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2563eb">
    <script>
    (() => {
      let saved = null;
      try {
        saved = localStorage.getItem("toolzeasy-theme");
      } catch (error) {
        saved = null;
      }
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=20260705-dark">
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z15B1W6MGV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z15B1W6MGV');
  </script>
</head>
  <body>
    <main class="hero">
      <div class="hero-copy">
        <p class="eyebrow">404</p>
        <h1>Page not found</h1>
        <p class="hero-text">That page is not available. Go back to the tools homepage.</p>
        <div class="hero-actions">
          <a class="button primary" href="/">Open ToolzEasy</a>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" aria-pressed="false">Dark</button>
        </div>
      </div>
    </main>
    <script src="theme.js?v=20260705-dark" defer></script>
  </body>
